general {
    hide_cursor = true
  }

background {
    monitor = 
    color = rgba(0,0,0,1)
  }

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    placeholder_text = Password...
    position = 0, -100
    halign = center
    valign = center
    fade_on_empty = false
  }

label {
    monitor =
    text = cmd[update:1000] echo "$(date + "%H:%M")"
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
  }
